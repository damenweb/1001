<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Викторина - No Spoilers</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #0a0a12; --panel-left: #7b1d1d; --panel-right: #1d3e5e;
            --gold: #ffcc00; --correct: #2ecc71; --wrong: #e74c3c;
        }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #gameInterface { display: none; width: 100%; height: 100%; }
        #uploadScreen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 2000; }
        
        .side-panel { width: 340px; display: flex; flex-direction: column; align-items: center; padding: 25px; transition: 0.5s; border: 2px solid transparent; }
        .left { background: linear-gradient(to bottom, var(--panel-left), #000); }
        .right { background: linear-gradient(to bottom, var(--panel-right), #000); }
        .active-team { box-shadow: inset 0 0 80px rgba(255,255,255,0.25); border-color: white; z-index: 10; }
        
        .score-box { font-size: 5rem; font-weight: 900; margin: 5px 0; }
        .main-content { flex: 1; padding: 30px; display: flex; flex-direction: column; }
        .grid { display: grid; gap: 10px; grid-template-columns: 280px repeat(5, 1fr); margin-top: 20px; }
        
        .category-btn { background: #161625; border: 2px solid #333; color: white; padding: 10px 15px; font-weight: 800; border-radius: 10px; cursor: pointer; text-transform: uppercase; font-size: 0.9rem; height: 4.5rem; display: flex; align-items: center; justify-content: center; text-align: center; }
        .q-cell { background: rgba(255,255,255,0.05); border: 2px solid #222; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 900; color: rgba(255,255,255,0.1); }
        .q-cell.active-q { border-color: var(--gold); color: white; background: #1a1a2e; }
        .q-cell.correct { background: var(--correct); color: white; }
        .q-cell.wrong-total { background: var(--wrong); color: white; opacity: 0.4; }

        #qModal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; z-index: 1000; }
        
        /* КОНТЕЙНЕР ДЛЯ СКРЫТИЯ СПОЙЛЕРОВ */
        #yt-wrapper {
            width: 640px;
            height: 360px;
            overflow: hidden; /* Обрезает всё, что выходит за рамки */
            position: relative;
            border-radius: 15px;
            background: #000;
            display: none;
        }

        #yt-player {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            /* Увеличиваем видео, чтобы название (верх) и лого (низ) ушли за край */
            transform: scale(1.35); 
        }

        /* Прозрачный щит поверх видео, чтобы нельзя было кликнуть и увидеть название */
        #yt-shield {
            position: absolute;
            inset: 0;
            z-index: 10;
            background: transparent;
        }

        #mediaBox img { max-height: 50vh; border-radius: 15px; border: 3px solid #333; }
        #qText { font-size: 2.5rem; text-align: center; margin: 20px; font-weight: 700; z-index: 20; }
        .ans-text { color: var(--gold); font-size: 3rem; margin-top: 20px; display: none; font-weight: 900; text-align: center; border: 4px solid var(--gold); padding: 20px; border-radius: 20px; z-index: 20; }
        
        .control-btn { padding: 20px 40px; font-size: 1.2rem; font-weight: 800; border-radius: 15px; cursor: pointer; border: none; margin: 10px; z-index: 20; }
        .btn-bank { background: var(--gold); color: black; display: none; }
        #fileInput { background: #1a1a2e; color: white; padding: 20px; border: 2px dashed #444; border-radius: 15px; }
    </style>
</head>
<body>

<div id="uploadScreen">
    <h1 style="margin-bottom: 20px; letter-spacing: 2px;">ЗАГРУЗИТЕ ФАЙЛ</h1>
    <input type="file" id="fileInput" accept=".xlsx, .xls">
</div>

<div id="gameInterface">
    <div class="side-panel left active-team" id="panel-0">
        <div id="status-0" class="turn-status"></div>
        <div class="team-name" contenteditable="true">КОМАНДА 1</div>
        <div class="score-box" id="score-0">0</div>
        <div class="bank-info" id="bank-0">В БАНКЕ: 0</div>
        <button class="control-btn btn-bank" id="bankBtn-0" onclick="saveToBank()">ЗАБРАТЬ БАЛЛЫ</button>
    </div>

    <div class="main-content">
        <div class="grid" id="gameGrid"></div>
    </div>

    <div class="side-panel right" id="panel-1">
        <div id="status-1" class="turn-status"></div>
        <div class="team-name" contenteditable="true">КОМАНДА 2</div>
        <div class="score-box" id="score-1">0</div>
        <div class="bank-info" id="bank-1">В БАНКЕ: 0</div>
        <button class="control-btn btn-bank" id="bankBtn-1" onclick="saveToBank()">ЗАБРАТЬ БАЛЛЫ</button>
    </div>
</div>

<div id="qModal">
    <div id="yt-wrapper">
        <div id="yt-shield"></div>
        <div id="yt-player"></div>
    </div>
    <div id="mediaBox"></div>
    <div id="qText"></div>
    <div id="ansText" class="ans-text"></div>
    <div id="modalControls" style="display: flex;">
        <button class="control-btn" style="background:var(--correct); color:white" onclick="handleResult(true)">ВЕРНО</button>
        <button class="control-btn" style="background:var(--wrong); color:white" onclick="handleResult(false)">ОШИБКА</button>
    </div>
    <button id="closeQBtn" class="control-btn" style="display:none; background:#444; color:white" onclick="closeModal()">ЗАКРЫТЬ</button>
</div>

<script>
    let gameData = [], currentRound = 1, activeTeam = 0, currentBank = 0, activeQ = null;
    let lockedCategory = null, player = null, playerReady = false;
    let teamLocks = [[], []];

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', { 
            height: '100%', width: '100%', 
            playerVars: { 
                'autoplay': 1, 'controls': 0, 'rel': 0, 
                'showinfo': 0, 'modestbranding:': 1, 'iv_load_policy': 3,
                'disablekb': 1, 'fs': 0
            },
            events: { 'onReady': () => { playerReady = true; } }
        });
    }

    document.getElementById('fileInput').addEventListener('change', e => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
            gameData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]).map(q => ({ 
                ...q, Category: String(q.Category).trim(), status: 'open', tries: 0 
            }));
            document.getElementById('uploadScreen').style.display = 'none';
            document.getElementById('gameInterface').style.display = 'flex';
            renderGrid(); updateUI();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function renderGrid() {
        const grid = document.getElementById('gameGrid'); grid.innerHTML = '';
        const roundData = gameData.filter(d => d.Round == currentRound);
        const categories = [...new Set(roundData.map(d => d.Category))];
        categories.forEach(cat => {
            const catQs = roundData.filter(d => d.Category === cat).slice(0, 5);
            const btn = document.createElement('button');
            btn.className = 'category-btn';
            btn.innerText = cat;
            btn.disabled = catQs.every(q => q.status !== 'open') || lockedCategory && lockedCategory !== cat;
            btn.onclick = () => startQuestion(cat);
            grid.appendChild(btn);
            catQs.forEach((q, i) => {
                const cell = document.createElement('div');
                cell.className = 'q-cell ' + (q.status === 'correct' ? 'correct' : q.status === 'fail' ? 'wrong-total' : '');
                cell.innerText = i + 1;
                grid.appendChild(cell);
            });
        });
    }

    function playMedia(type, url, start, duration) {
        const wrapper = document.getElementById('yt-wrapper');
        const mBox = document.getElementById('mediaBox');
        const shield = document.getElementById('yt-shield');
        
        mBox.innerHTML = '';
        wrapper.style.display = 'none';
        shield.style.display = 'block'; // Включаем защиту от кликов по умолчанию

        if (!url || url === "undefined") return;

        if (type === 'image') {
            mBox.innerHTML = `<img src="${url}">`;
        } else if ((type === 'video' || type === 'audio') && playerReady) {
            wrapper.style.display = 'block';
            const vId = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('be/')[1];
            
            player.loadVideoById({
                videoId: vId,
                startSeconds: parseInt(start) || 0,
                endSeconds: (parseInt(start) || 0) + (parseInt(duration) || 30)
            });
            player.playVideo();
            player.unMute();
        }
    }

    function startQuestion(catName) {
        const q = gameData.find(d => d.Round == currentRound && d.Category === catName && d.status === 'open');
        if (!q) return;
        activeQ = q; lockedCategory = catName;
        document.getElementById('ansText').style.display = 'none';
        document.getElementById('modalControls').style.display = 'flex';
        document.getElementById('closeQBtn').style.display = 'none';
        document.getElementById('qText').innerText = q.Question || "";
        document.getElementById('ansText').innerText = "ОТВЕТ: " + (q.Answer || "");
        document.getElementById('qModal').style.display = 'flex';
        setTimeout(() => playMedia(q.QType, q.QMediaURL, q.QStartTime, q.QDuration), 300);
    }

    function handleResult(isCorrect) {
        const categoryQs = gameData.filter(d => d.Category === activeQ.Category && d.Round == currentRound);
        const idx = categoryQs.indexOf(activeQ) + 1;
        if (isCorrect) {
            activeQ.status = 'correct';
            currentBank += (currentRound === 2 ? idx * 2 : idx);
            if (categoryQs.every(q => q.status !== 'open')) {
                const s = document.getElementById(`score-${activeTeam}`);
                s.innerText = parseInt(s.innerText) + currentBank;
                currentBank = 0; lockedCategory = null;
                activeTeam = activeTeam === 0 ? 1 : 0;
            }
            showAnswerState();
        } else {
            activeQ.status = 'fail';
            currentBank = 0; lockedCategory = null;
            activeTeam = activeTeam === 0 ? 1 : 0;
            showAnswerState();
        }
        updateUI(); renderGrid();
    }

    function showAnswerState() {
        document.getElementById('modalControls').style.display = 'none';
        document.getElementById('ansText').style.display = 'block';
        document.getElementById('closeQBtn').style.display = 'block';
        document.getElementById('yt-shield').style.display = 'none'; // Убираем щит, чтобы можно было нажать паузу на ответе
        playMedia(activeQ.AType, activeQ.AMediaURL, activeQ.AStartTime, activeQ.ADuration);
    }

    function closeModal() {
        if (player) player.stopVideo();
        document.getElementById('qModal').style.display = 'none';
    }

    function saveToBank() {
        const s = document.getElementById(`score-${activeTeam}`);
        s.innerText = parseInt(s.innerText) + currentBank;
        currentBank = 0; lockedCategory = null; activeTeam = activeTeam === 0 ? 1 : 0;
        updateUI(); renderGrid();
    }

    function updateUI() {
        document.getElementById('panel-0').classList.toggle('active-team', activeTeam === 0);
        document.getElementById('panel-1').classList.toggle('active-team', activeTeam === 1);
        document.getElementById(`bank-0`).style.visibility = (activeTeam === 0 && currentBank > 0) ? 'visible' : 'hidden';
        document.getElementById(`bank-1`).style.visibility = (activeTeam === 1 && currentBank > 0) ? 'visible' : 'hidden';
        document.getElementById(`bankBtn-0`).style.display = (activeTeam === 0 && currentBank > 0) ? 'block' : 'none';
        document.getElementById(`bankBtn-1`).style.display = (activeTeam === 1 && currentBank > 0) ? 'block' : 'none';
        document.getElementById('bank-0').innerText = `В БАНКЕ: ${currentBank}`;
        document.getElementById('bank-1').innerText = `В БАНКЕ: ${currentBank}`;
    }
</script>
</body>
</html>
