<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>1 к 100 © Collin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --pastel-red: #8B2E2E; 
            --pastel-blue: #2F4F6F;
            --bg-dark: #1C1C1C;
            --main-text: #ffffff;
            --accent-wrong: #ff4444;
            --board-bg: #101030;
            --card-front-border: #202060;
            --card-back-bg: #fceabb;
            --card-text-color: #1C1C1C;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0;
            background: var(--bg-dark); color: var(--main-text);
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: row; 
        }

        .upload-container { position: absolute; bottom: 15px; left: 15px; z-index: 100; }
        .btn-upload, .btn-start-game { 
            background: rgba(255, 255, 255, 0.1); color: white; 
            width: 45px; height: 45px; font-size: 1.2rem;
            border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

		.btn-upload:hover, .btn-start-game:hover {
			background: rgba(255, 255, 255, 0.2);
			border-color: rgba(255, 255, 255, 0.4);
		}

        .side-panel {
            width: 280px; min-width: 280px; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; padding: 20px;
            transition: 0.3s ease;
        }
        .side-panel.left { background: linear-gradient(to right, var(--pastel-red), var(--bg-dark)); }
        .side-panel.right { background: linear-gradient(to left, var(--pastel-blue), var(--bg-dark)); }
        
		
		/* Подсветка для ЛЕВОЙ команды (Красная) */
		.side-panel.left.active-team {
			background: linear-gradient(to right, #ff4d4d, var(--bg-dark)); /* Сочный красный */
		}

		/* Подсветка для ПРАВОЙ команды (Синяя) */
		.side-panel.right.active-team {
			background: linear-gradient(to left, #4d94ff, var(--bg-dark)); /* Яркий синий */
		}
		
		/*.side-panel.active-team { filter: brightness(1.3); box-shadow: inset 0 0 50px rgba(255,255,255,0.1); }*/

		.team-name {
			background: transparent; 
			border: none;
			color: var(--main-text); 
			font-weight: 800; 
			font-size: 1.4rem;
			text-transform: uppercase; 
			text-align: center;
			width: 100%; 
			height: 90px; 
			resize: none; 
			overflow: hidden; /* Скрывает скроллбар, если текста много */
			font-family: inherit; 
			margin-bottom: 15px;
			outline: none; /* Убирает рамку при нажатии */
			
			/* Добавьте эти строки для центрирования контента */
			display: flex;
			align-items: center;      /* Центр по вертикали */
			justify-content: center;   /* Центр по горизонтали */
			line-height: 1.2;          /* Чтобы многострочный текст не слипался */
			padding-top: 20px;         /* Небольшой костыль для textarea, если текст "прилипает" к верху */
		}

		.score-input {
			/*background: rgba(0,0,0,0.3);*/
			/*border: 2px solid rgba(255, 255, 255, 0.3);*/
			color: var(--main-text); 
			font-weight: 800; 
			font-size: 4.4rem;/*5.5rem;*/
			text-align: center; 
			/*border-radius: 15px;*/
			width: 100%; 
			max-width: 300px;/*190px;*/
			height: 130px;
			outline: none;
			box-shadow: none;
			background: transparent;
			border: none;
			overflow: hidden; /* КРИТИЧНО: убирает скроллбар внутри инпута */
			-moz-appearance: textfield; /* Для Firefox */
			transform: scaleY(1.1);    /* Вытягивает число по вертикали */
			display: block;            /* Нужно для корректной работы трансформации */
			margin: 0 auto;            /* Центрирует после растяжения */
		}
		
		/* На всякий случай убираем аутлайн при клике (фокусе) */
		.score-input:focus {
			outline: none;
			border: none;
			box-shadow: none;
		}
				
		/* Дополнительно для Chrome/Safari, чтобы убрать стрелочки и лишние отступы */
		.score-input::-webkit-outer-spin-button,
		.score-input::-webkit-inner-spin-button {
			-webkit-appearance: none;
			margin: 0;
		}

        .players-box { width: 100%; flex-grow: 1; margin-top: 20px; display: flex; flex-direction: column; align-items: center; }
        .player-list { width: 100%; list-style: none; padding: 0; margin: 10px 0; }
		
		.player-item {
			display: flex; 
			justify-content: center; /* Центрирует по горизонтали */
			align-items: center;     /* Центрирует по вертикали */
			padding: 8px 12px; 
			margin-bottom: 5px; 
			background: rgba(0,0,0,0.2);
			border-radius: 5px; 
			width: 100%; 
			font-weight: 600;
			border: 2px solid transparent; 
			transition: 0.2s; 
			font-size: 1.1rem;
			position: relative; /* Чтобы кнопка удаления не мешала центровке текста */
		}
		
		/* Чтобы имя было строго по центру, а крестик не "отъедал" место */
		.player-item span:first-child {
			flex-grow: 1;
			text-align: center;
			margin-left: 24px; /* Компенсируем ширину крестика для идеальной симметрии */
		}

        .player-item.current-turn { border-color: #fff; background: rgba(255,255,255,0.2); transform: scale(1.05); }

		.remove-p-btn { 
			color: var(--accent-wrong); 
			cursor: pointer; 
			font-weight: 800; 
			opacity: 0.6;
			width: 24px;
			text-align: right;
		}

		.remove-p-btn:hover { opacity: 1; }
        .add-p-btn { background: rgba(255,255,255,0.1); border: 1px dashed #fff; color: #fff; padding: 5px 15px; border-radius: 20px; cursor: pointer; }

        .main-content { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow: hidden; transition: opacity 0.5s; }
        .hidden { opacity: 0; pointer-events: none; }
        
		.top-nav {
			display: flex;
			flex-direction: column;
			align-items: center;
			/* Фиксируем высоту, чтобы контент ниже не дергался */
			height: 250px; 
			min-height: 250px;
			margin-bottom: 10px;
			justify-content: flex-start; /* Элементы будут идти сверху вниз */
			flex-shrink: 0; /* Запрещаем панели сжиматься, если экран маленький */
		}

        .nav-controls { display: flex; align-items: center; gap: 30px; margin-top: 10px; }
        #file-status { font-size: 1.6rem; font-weight: 800; }

        .btn-nav {
            background: #fff; border: none; color: #000;
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .btn-nav:disabled { opacity: 0.2; cursor: default; }

        .question-container {
            margin-top: 10px; min-height: 100px;
            display: flex; align-items: center; justify-content: center; width: 100%;
        }
        #question-text { 
            font-weight: 700; font-size: 1.8rem; text-align: center; 
            text-transform: uppercase; line-height: 1.2; max-width: 90%;
        }

		.timer-zone {
			font-size: 3.5rem;
			font-weight: 800;
			margin: 5px 0;
			cursor: pointer;
			text-align: center;
			transition: opacity 0.3s;

			/* ДОБАВЬТЕ ЭТИ СТРОКИ */
			min-width: 300px;   /* Чтобы надпись "Ваш ответ?" не расширяла блок */
			height: 80px;      /* Фиксированная высота */
			display: flex;
			align-items: center;
			justify-content: center;
			flex-shrink: 0;    /* Запрещает блоку сжиматься */
		}
		
		.timer-zone.invisible { opacity: 0; pointer-events: none; }
        .timer-zone.warning { color: var(--accent-wrong); animation: blink 0.5s infinite; }
        .timer-zone.time-up { font-size: 2rem; color: var(--accent-wrong); }

        @keyframes blink { 50% { opacity: 0.5; } }

        .game-area {
			display: flex;
			flex-direction: row;
			align-items: center;
			justify-content: center;
			width: 100%;
			gap: 20px;
			
			/* ИЗМЕНИТЬ ЗДЕСЬ */
			margin: auto 0;       /* Автоматические отступы сверху и снизу центрируют блок */
			padding-bottom: 0;    /* Убираем лишний паддинг, чтобы центровка была честной */
		}
		
		.strike-group { display: flex; flex-direction: column; gap: 15px; }
        .strike {
            width: 65px; height: 65px; background: rgba(255, 255, 255, 0.05);
            border: 3px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.8rem; font-weight: 900; color: rgba(255, 255, 255, 0.02);
        }
        .strike.active { background: #fff; color: var(--accent-wrong); box-shadow: 0 0 25px #fff; }

        .board-container { width: 650px; display: flex; flex-direction: column; gap: 8px; }
        .answer-card { height: 55px; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .answer-card.flipped { transform: rotateX(180deg); }
		
		/* Оранжевый фон для отрицательных очков */
		.answer-card.negative .card-back {
			background: #ff9800; /* Яркий оранжевый */
			color: #ffffff;
			border-color: #ffb74d;
		}
		
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; border-radius: 6px; font-weight: 700; text-transform: uppercase; }
        .card-front { background: var(--board-bg); border: 2px solid var(--card-front-border); justify-content: center; color: var(--card-back-bg); font-size: 1.6rem; }
        .card-back { background: var(--card-back-bg); color: var(--card-text-color); transform: rotateX(180deg); border: 2px solid #fff; justify-content: center; }
        .ans-text { text-align: center; width: 100%; padding: 0 80px; font-size: 1.4rem; font-weight: 800; }
        .ans-points { position: absolute; right: 0; height: 100%; width: 70px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.9rem; border-left: 3px solid rgba(0,0,0,0.1); background: rgba(0,0,0,0.05); }
    
		/* Кнопка справки */
		.btn-help {
			background: rgba(255, 255, 255, 0.1);
			color: white;
			width: 45px;
			height: 45px;
			font-size: 1.2rem;
			border-radius: 8px;
			border: 1px solid rgba(255, 255, 255, 0.2);
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: all 0.3s;
		}

		.btn-help:hover {
			background: rgba(255, 255, 255, 0.3);
		}

		/* Модальное окно (оверлей) */
		.modal-overlay {
			position: fixed;
			top: 0; left: 0; width: 100%; height: 100%;
			background: rgba(0, 0, 0, 0.85);
			display: none; /* Скрыто по умолчанию */
			align-items: center;
			justify-content: center;
			z-index: 1000;
			backdrop-filter: blur(5px);
		}

		/* Контент окна */
		.modal-content {
			background: #2a2a2a;
			padding: 30px 30px 0px 30px;
			border-radius: 15px;
			border: 2px solid #444;
			max-width: 500px;
			width: 90%;
			position: relative;
			box-shadow: 0 0 30px rgba(0,0,0,0.5);
		}

		.modal-close {
			position: absolute;
			top: 10px; right: 15px;
			font-size: 1.5rem;
			cursor: pointer;
			color: #888;
		}

		.modal-close:hover { color: #fff; }

		.help-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
		.help-table td { padding: 10px; border-bottom: 1px solid #3d3d3d; }
		.help-key { 
			background: #444; 
			padding: 3px 8px; 
			border-radius: 4px; 
			font-family: monospace; 
			color: #ffca28; 
			font-weight: bold;
		}
		
		.winner-highlight {
			z-index: 100;
			outline: 8px solid #ffd700 !important;
			animation: winner-glow 1.5s infinite ease-in-out;
			background: linear-gradient(to bottom, #ffd700, #b8860b) !important;
		}
		@keyframes winner-glow {
			0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); transform: scale(1.02); }
			50% { box-shadow: 0 0 60px rgba(255, 215, 0, 0.9); transform: scale(1.05); }
		}
	</style>
</head>
<body>

<div class="upload-container" style="display: flex; gap: 10px;">
    <button class="btn-upload" onclick="document.getElementById('fileInput').click()">📂</button>
    <input type="file" id="fileInput" accept=".xlsx, .xls" style="display: none;">

    <button id="startGameBtn" class="btn-start-game" onclick="startGame()" style="display: none;">▶</button>
    
    <button class="btn-help" onclick="toggleHelp(event)">?</button>
</div>

<div id="helpModal" class="modal-overlay" onclick="closeHelp()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="closeHelp()">&times;</span>
        <h2 style="margin-top: 0; color: #fff; text-align: center;">Управление игрой</h2>
        <table class="help-table">
		    <tr align="center">
                <td><span class="help-key">`</span> <span class="help-key">~</span> <span class="help-key">Ё</span></td>
                <td>Засчитать промах</td>
            </tr>
            <tr align="center">
                <td><span class="help-key">1</span> <span class="help-key">2</span> <span class="help-key">3</span> <span class="help-key">4</span> <span class="help-key">5</span>
				<span class="help-key">6</span> <span class="help-key">7</span> <span class="help-key">8</span> <span class="help-key">9</span> <span class="help-key">0</span></td>
                <td>Открыть карточку с соответствующим номером</td>
            </tr>
            <!--<tr align="center">
                <td><span class="help-key">-</span></td>
                <td>Звук аплодисментов</td>
            </tr>
            <tr align="center">
                <td><span class="help-key">=</span></td>
                <td>Звук победных фанфар</td>
            </tr>-->
        </table>
        <p style="font-size: 0.85rem; color: #888; text-align: center; margin-top: 20px;">
            Кликните в любом месте, чтобы закрыть
        </p>
    </div>
</div>

<div class="side-panel left" id="panel-0">
    <textarea class="team-name">КОМАНДА 1</textarea>
    <input type="number" class="score-input" id="score-0" value="0">
    <div class="players-box">
        <ul class="player-list" id="list-0"></ul>
        <button class="add-p-btn" onclick="addPlayer(0)">+ ИГРОК</button>
    </div>
</div>

<div class="main-content hidden" id="main-content">
    <div class="top-nav">
        <div class="nav-controls">
            <button class="btn-nav" id="prevBtn" onclick="changeQuestion(-1)" disabled>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <div id="file-status">0 / 0</div>
            <button class="btn-nav" id="nextBtn" onclick="changeQuestion(1)" disabled>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            </button>
        </div>
        <div class="question-container">
            <div id="question-text"></div>
        </div>
        <div class="timer-zone invisible" id="timer" onclick="toggleTimer()"></div>
    </div>

    <div class="game-area">
        <div class="strike-group" id="strikes-0">
            <div class="strike">X</div><div class="strike">X</div><div class="strike">X</div><div class="strike">X</div>
        </div>
        <div class="board-container" id="game-board"></div>
        <div class="strike-group" id="strikes-1">
            <div class="strike">X</div><div class="strike">X</div><div class="strike">X</div><div class="strike">X</div>
        </div>
    </div>
</div>

<div class="side-panel right" id="panel-1">
    <textarea class="team-name">КОМАНДА 2</textarea>
    <input type="number" class="score-input" id="score-1" value="0">
    <div class="players-box">
        <ul class="player-list" id="list-1"></ul>
        <button class="add-p-btn" onclick="addPlayer(1)">+ ИГРОК</button>
    </div>
</div>

<script>
    let gameData = [];
    let currentIdx = 0;
    const sounds = { 
        flip: 'yes.mp3', 
        strike: 'no.mp3', 
        clap: 'clap.mp3', 
        congrats: 'congrats.mp3', 
        fail: 'fail.mp3', 
        timer: 'timer.mp3' 
    };

    let players = [[], []];
    let activeTeam = 0; 
    let currentTurnIndices = [0, 0]; 
    let roundSequence = []; 
    let sequencePointer = 0; 
    
	let revealTimeouts = []; // Массив для таймеров открытия карт
	
	const timerValMain = 10;
    let timerVal = timerValMain;
    let turnCounter = 0; 
    let timerInterval = null;
    let autoStartTimeout = null;
    let turnTimeout = null; // Ссылка на таймаут секундной паузы
    let isTransitioning = true; // Флаг блокировки действий

    function playAudio(type) { new Audio(sounds[type]).play().catch(() => {}); }

    function addPlayer(team) {
        const name = prompt("Имя игрока:");
        if (name) { 
            players[team].push(name); 
            generateRoundSequence();
            updateUI(); 
        }
    }

    function removePlayer(team, index) {
        players[team].splice(index, 1);
        generateRoundSequence();
        if (roundSequence.length > 0) {
            sequencePointer = sequencePointer % roundSequence.length;
        } else {
            sequencePointer = 0;
        }
        syncIndicesToSequence();
        updateUI();
    }

    function generateRoundSequence() {
        const maxPlayers = Math.max(players[0].length, players[1].length);
        roundSequence = [];
        if (maxPlayers === 0) return;

        let startTeam = currentIdx % 2; 
        let startingPlayerOffset = Math.floor(currentIdx / 2);

        for (let i = 0; i < maxPlayers * 10; i++) { 
            let pOffset = Math.floor(i / 2);
            let team = (i % 2 === 0) ? startTeam : (1 - startTeam);
            if (players[team].length > 0) {
                let playerIdx = (pOffset + startingPlayerOffset) % players[team].length;
                roundSequence.push({ team: team, pIdx: playerIdx });
            }
        }
    }

    function initQuestionTurn() {
		document.getElementById('panel-0').classList.remove('winner-highlight');
		document.getElementById('panel-1').classList.remove('winner-highlight');
		// 1. ОЧИСТКА ЗВУКОВ: убиваем таймеры открытия карт, чтобы звуки не лезли в новый вопрос
        revealTimeouts.forEach(t => clearTimeout(t));
        revealTimeouts = [];

        // 2. Твоя стандартная очистка (как и была)
        clearTimeout(turnTimeout); 
        clearTimeout(autoStartTimeout);
        clearInterval(timerInterval);
        
        isTransitioning = false; 
        sequencePointer = 0;
        turnCounter = 0; 
        
        generateRoundSequence();
        if (roundSequence.length > 0) syncIndicesToSequence();

        document.querySelectorAll('.strike').forEach(s => s.classList.remove('active'));
        
        resetTimerManually();
        const timerEl = document.getElementById('timer');
        timerEl.classList.add('invisible'); 
        
        autoStartTimeout = setTimeout(() => {
            timerEl.classList.remove('invisible');
            startNewTurnTimer();
        }, 3000);

        updateUI();
    }

    function syncIndicesToSequence() {
        if (roundSequence.length > 0 && roundSequence[sequencePointer]) {
            const current = roundSequence[sequencePointer];
            activeTeam = current.team;
            currentTurnIndices[current.team] = current.pIdx;
        } else { activeTeam = -1; }
    }

    function switchTurn() {
        const strikes0 = document.querySelectorAll('#strikes-0 .active').length;
        const strikes1 = document.querySelectorAll('#strikes-1 .active').length;
        const timerEl = document.getElementById('timer');

        if (strikes0 >= 4 && strikes1 >= 4) {
            activeTeam = -1; 
            clearInterval(timerInterval);
            clearTimeout(turnTimeout);
            timerEl.classList.remove('warning', 'time-up');
            timerEl.classList.add('invisible');
            revealAllCards(); 
            updateUI();
            return;
        }

        clearInterval(timerInterval);
        timerEl.classList.add('invisible');
        timerEl.innerText = ""; 
        timerEl.classList.remove('warning', 'time-up');

        // Сохраняем таймаут, чтобы его можно было отменить при смене вопроса
        turnTimeout = setTimeout(() => {
            let foundNext = false;
            let attempts = 0;
            while (!foundNext && attempts < roundSequence.length) {
                sequencePointer = (sequencePointer + 1) % roundSequence.length;
                let next = roundSequence[sequencePointer];
                const teamStrikes = document.querySelectorAll(`#strikes-${next.team} .active`).length;
                if (teamStrikes < 4) {
                    foundNext = true;
                    syncIndicesToSequence();
                    turnCounter++; 
                }
                attempts++;
            }

            if (!foundNext) {
                activeTeam = -1;
            } else {
                timerEl.classList.remove('invisible');
                startNewTurnTimer(); 
            }
            
            isTransitioning = false; 
            updateUI(); 
        }, 4000); 
    }

	function revealAllCards() {
		const cards = document.querySelectorAll('.answer-card');
		let delay = 3000; 

		cards.forEach((card) => {
			if (!card.classList.contains('flipped')) {
				// Сохраняем ID таймера в массив
				const t = setTimeout(() => {
					playAudio('flip'); 
					card.classList.add('flipped');
					const totalFlipped = document.querySelectorAll('.answer-card.flipped').length;
					if (totalFlipped === cards.length && currentIdx === gameData.length - 1) {
						setTimeout(() => runGrandFinale(), 3000);
					}
				}, delay);
				revealTimeouts.push(t);
				delay += 3000; 
			}
		});
	}

	function openCard(index) {
        if (isTransitioning) return;
        
        const cards = document.querySelectorAll('.answer-card');
        const currentAnswers = gameData[currentIdx]?.answers;
        
        if (!cards[index] || cards[index].classList.contains('flipped')) return;

        const points = parseInt(currentAnswers[index].points) || 0;
        playAudio(points < 0 ? 'fail' : 'flip');
        cards[index].classList.add('flipped');

        // ПРОВЕРКА: Все ли разгадано?
        const flippedCount = document.querySelectorAll('.answer-card.flipped').length;
        if (flippedCount === cards.length) {
            clearInterval(timerInterval);
            clearTimeout(turnTimeout);
            activeTeam = -1;
            document.getElementById('timer').classList.add('invisible');
            isTransitioning = false;
            updateUI();
			if (currentIdx === gameData.length - 1) {
				setTimeout(() => runGrandFinale(), 3000);
			} else {
				setTimeout(() => playAudio('clap'), 3000);
			}
            return;
        }

        if (activeTeam !== -1) {
            isTransitioning = true; 
            const scoreEl = document.getElementById(`score-${activeTeam}`);
            scoreEl.value = parseInt(scoreEl.value) + points;
            switchTurn();
        }
    }

    function addStrike() {
        if (isTransitioning || activeTeam === -1) return;
        
        const strikeGroup = document.getElementById(`strikes-${activeTeam}`);
        const strikes = strikeGroup.querySelectorAll('.strike');
        for (let s of strikes) {
            if (!s.classList.contains('active')) {
                s.classList.add('active');
                playAudio('strike');
                isTransitioning = true; 
                switchTurn();
                break;
            }
        }
    }

    function toggleTimer() {
        if (timerInterval) { 
            clearInterval(timerInterval); 
            timerInterval = null; 
        } else {
            startInterval();
        }
    }

    function startNewTurnTimer() {
        clearInterval(timerInterval);
        timerVal = timerValMain + (turnCounter * 2); 
        const timerEl = document.getElementById('timer');
        timerEl.innerText = timerVal;
        timerEl.classList.remove('warning', 'time-up');
        timerEl.classList.remove('invisible');
        startInterval();
    }

    function resetTimerManually() {
        clearInterval(timerInterval);
        timerInterval = null;
        timerVal = timerValMain;
        const timerEl = document.getElementById('timer');
        timerEl.innerText = `${timerValMain}`;
        timerEl.classList.remove('warning', 'time-up');
    }

    function startInterval() {
        const timerEl = document.getElementById('timer');
        timerInterval = setInterval(() => {
            if (timerVal > 0) {
                timerVal--;
                timerEl.innerText = timerVal;
                if (timerVal <= 3 && timerVal > 0) {
                    timerEl.classList.add('warning');
                }
            } else {
                clearInterval(timerInterval);
                timerInterval = null;
                playAudio('timer');
                timerEl.classList.remove('warning');
                timerEl.classList.add('time-up');
                timerEl.innerText = "Ваш ответ?";
            }
        }, 1000);
    }

	// 1. Обработчик выбора файла
    document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            const grouped = {};
            json.forEach(row => {
                if (row.Question) {
                    if (!grouped[row.Question]) grouped[row.Question] = [];
                    grouped[row.Question].push({ text: row.Answer || "", points: row.Points || 0 });
                }
            });
            gameData = Object.keys(grouped).map(k => ({ question: k, answers: grouped[k] }));
            currentIdx = 0; 

            // Вместо старта просто показываем кнопку
            const startBtn = document.getElementById('startGameBtn');
            startBtn.style.display = 'block';
            startBtn.innerText = `▶`;
        };
        reader.readAsArrayBuffer(file);
    });

    // 2. Функция запуска игры
	function startGame() {
        // 1. Проверка на наличие загруженного файла
        if (gameData.length === 0) {
            alert("Сначала выберите файл с вопросами!");
            return;
        }

        // 2. Проверка на наличие игроков в обеих командах
        if (players[0].length === 0 || players[1].length === 0) {
            alert("Добавьте хотя бы по одному игроку в каждую команду!");
            return;
        }
		
		document.getElementById('score-0').value = 0;
		document.getElementById('score-1').value = 0;

        // Если проверки пройдены:
        document.getElementById('startGameBtn').style.display = 'none';
        document.getElementById('main-content').classList.remove('hidden');
        
        initQuestionTurn(); 
        renderBoard();
        updateUI();
    }

    function renderBoard() {
        const board = document.getElementById('game-board');
        board.innerHTML = '';
        const current = gameData[currentIdx];
        document.getElementById('question-text').innerText = (current?.question || "").toUpperCase();
        if (current) {
            current.answers.forEach((ans, i) => {
                const card = document.createElement('div');
                const isNegative = parseInt(ans.points) < 0;
                card.className = `answer-card ${isNegative ? 'negative' : ''}`;
                
                card.innerHTML = `<div class="card-face card-front">${i+1}</div>
                    <div class="card-face card-back">
                        <span class="ans-text">${ans.text}</span>
                        <div class="ans-points">${ans.points}</div>
                    </div>`;
                board.appendChild(card);
            });
        }
    }

    function changeQuestion(step) {
        currentIdx += step;
        initQuestionTurn();
        renderBoard();
        updateUI();
    }

    function updateUI() {
        if (gameData.length > 0) {
            document.getElementById('file-status').innerText = `${currentIdx + 1} / ${gameData.length}`;
            document.getElementById('prevBtn').disabled = currentIdx === 0;
            document.getElementById('nextBtn').disabled = currentIdx === gameData.length - 1;
        }
        [0, 1].forEach(t => {
            const list = document.getElementById(`list-${t}`);
            list.innerHTML = players[t].map((p, i) => 
                `<li class="player-item ${activeTeam === t && currentTurnIndices[t] === i ? 'current-turn' : ''}">
                    <span>${p}</span>
                    <span class="remove-p-btn" onclick="removePlayer(${t}, ${i})">×</span>
                </li>`
            ).join('');
            document.getElementById(`panel-${t}`).classList.toggle('active-team', activeTeam === t);
        });
    }

	function toggleHelp(e) {
        e.stopPropagation(); // Чтобы клик на кнопку не закрыл окно сразу
        document.getElementById('helpModal').style.display = 'flex';
    }

    function closeHelp() {
        document.getElementById('helpModal').style.display = 'none';
    }
	
	function runGrandFinale() {
		const s0 = parseInt(document.getElementById('score-0').value) || 0;
		const s1 = parseInt(document.getElementById('score-1').value) || 0;
		const p0 = document.getElementById('panel-0');
		const p1 = document.getElementById('panel-1');

		// Подсветка победителя
		if (s0 >= s1) p0.classList.add('winner-highlight');
		if (s1 >= s0) p1.classList.add('winner-highlight');

		// Фанфары через 3 секунды
		playAudio('congrats');
	}

    window.addEventListener('keydown', (e) => {
        if (isTransitioning) return; 
        
        if (e.key >= '1' && e.key <= '9') openCard(parseInt(e.key) - 1);
        if (e.key === '0') openCard(9);
        if (e.code === 'Backquote' || ['~','`','ё','Ё'].includes(e.key)) {
            addStrike();
        }
        //if (e.key === '-') playAudio('clap');
        //if (e.key === '=') playAudio('congrats');
    });
</script>
